services:

  mariadb:
    image: mariadb
    container_name: mariadb_server
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - database_volume:/var/lib/mysql
    restart: unless-stopped

volumes:
  database_volume: