# Datasource
spring.datasource.url=jdbc:mariadb://localhost:3306/annuaire
spring.datasource.username=annuaire_user
spring.datasource.password=annuaire_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# Port serveur
server.port=8080

# Initialisation des donn�es au d�marrage
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-init.sql

# Admin credentials (utilisateur unique, pas de table users)
admin.login=admin
admin.password=admin1234

# JWT
jwt.secret=uneClefSecreteTresLongueAChangerEnProduction
jwt.expiration=86400000